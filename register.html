<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register - SBDEHAS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">

        <div class="container">

            <a class="navbar-brand" href="index.html">
                SBDEHAS
            </a>

            <div>

                <a href="index.html" class="btn btn-light btn-sm me-2">
                    Home
                </a>

                <a href="login.html"    id="loginBtn"   class="btn btn-light btn-sm">
                    Login
                </a>

            </div>

        </div>

    </nav>

    <div class="container">

        <div class="row justify-content-center mt-5">

            <div class="col-md-6">

                <div class="card shadow">

                    <div class="card-body p-4">

                        <h2 class="text-center text-danger mb-4">
                            Blood Donor Registration
                        </h2>

                        <form id="registerForm">

                            <div class="mb-3">

                                <label class="form-label">
                                    Full Name
                                </label>

                                <input type="text" id="name" class="form-control" required placeholder="Enter Full Name">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Blood Group
                                </label>

                                <select id="blood" class="form-select">

                                    <option>A+</option>
                                    <option>A-</option>
                                    <option>B+</option>
                                    <option>B-</option>
                                    <option>AB+</option>
                                    <option>AB-</option>
                                    <option>O+</option>
                                    <option>O-</option>

                                </select>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Phone Number
                                </label>

                                <input  type="tel" id="phone" class="form-control" required placeholder="Enter Phone Number">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    City
                                </label>

                                <input  type="text" id="city" class="form-control" required placeholder="Enter City">

                            </div>

                            <button type="submit"   class="btn btn-danger w-100">
                                Register

                            </button>

                        </form>

                        <div class="text-center mt-3">

                            <a href="login.html">
                                Already have an account? Login
                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <footer class="bg-dark text-white text-center py-4 mt-5">

        <p class="mb-1">
            Smart Blood Donor & Emergency Healthcare Assistance System
        </p>

        <p class="small mb-0">
            Developed for GTU Societal Internship Project
        </p>

    </footer>

    <script src="js/script.js"></script>

    <script>

        document.getElementById("registerForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const donor = {
        name: document.getElementById("name").value,
        blood: document.getElementById("blood").value,
        phone: document.getElementById("phone").value,
        city: document.getElementById("city").value
    };

    try {

        const response = await fetch(
            "http://localhost:8000/api/donors/register",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(donor)
            }
        );

        const data = await response.json();

        alert(data.message);

        this.reset();

    }
    catch(error)
    {
        console.log(error);
        alert("Registration Failed");
    }

});

        currentUser =
        localStorage.getItem("currentUser");

        let loginBtn =
        document.getElementById("loginBtn");

        if(currentUser)
        {
            loginBtn.innerHTML =
            "Dashboard";

            loginBtn.href =
            "dashboard.html";
        }

    </script>

</body>

</html>
