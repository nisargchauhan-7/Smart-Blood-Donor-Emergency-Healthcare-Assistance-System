<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Blood Request History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">

        <div class="container">

            <a class="navbar-brand" href="index.html">SBDEHAS</a>

            <div>

                <a href="dashboard.html" class="btn btn-light btn-sm me-2">Dashboard</a>

            </div>

        </div>

    </nav>

    <div class="container mt-5">

        <h1 class="text-danger mb-4">

            Blood Request History

        </h1>

        <table class="table table-bordered table-hover">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Patient</th>
                    <th>Blood Group</th>
                    <th>Hospital</th>
                    <th>Status</th>

                </tr>

            </thead>

            <tbody id="historyTable">

            </tbody>

        </table>

    </div>

    <script>

        fetch("http://localhost:8000/api/requests")

        .then(res => res.json())

        .then(data => {

            let historyTable =
            document.getElementById("historyTable");    

            historyTable.innerHTML = "";

            data.forEach(request => {

                historyTable.innerHTML += `

                <tr>

                    <td>${request.id}</td>

                    <td>${request.patient_name}</td>

                    <td>${request.blood_group}</td>

                    <td>${request.hospital_name}</td>

                    <td>

                        ${
                           request.status || "Pending"
                        }

                    </td>

                </tr>

                `;

            });

        })

        .catch(err => console.log(err));

    </script>

</body>
</html>
