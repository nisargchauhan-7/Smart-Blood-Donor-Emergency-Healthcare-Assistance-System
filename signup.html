<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sign Up - SBDEHAS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">

        <div class="container">

            <a class="navbar-brand" href="index.html">
                SBDEHAS
            </a>

            <div>

                <a href="index.html" class="btn btn-light btn-sm me-2">
                    Home
                </a>

                <a href="login.html" class="btn btn-light btn-sm">
                    Login
                </a>

            </div>

        </div>

    </nav>

    <div class="container">

        <div class="row justify-content-center mt-5">

            <div class="col-md-6">

                <div class="card shadow">

                    <div class="card-body p-4">

                        <h2 class="text-center text-danger mb-4">
                            Create Account
                        </h2>

                        <form id="signupForm">

                            <div class="mb-3">

                                <label class="form-label">
                                    Full Name
                                </label>

                                <input type="text"
                                       id="fullName"
                                       class="form-control"
                                       required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Email
                                </label>

                                <input type="email"
                                       id="email"
                                       class="form-control"
                                       required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Password
                                </label>

                                <input type="password"
                                       id="password"
                                       class="form-control"
                                       required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Confirm Password
                                </label>

                                <input type="password"
                                       id="confirmPassword"
                                       class="form-control"
                                       required>

                            </div>

                            <button type="submit"
                                    class="btn btn-danger w-100">

                                Create Account

                            </button>

                        </form>

                        <div class="text-center mt-3">

                            <a href="login.html">
                                Already have an account? Login
                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <footer class="bg-dark text-white text-center py-4 mt-5">

        <p class="mb-1">
            Smart Blood Donor & Emergency Healthcare Assistance System
        </p>

        <p class="small mb-0">
            Developed for GTU Societal Internship Project
        </p>

    </footer>

    <script>

document.getElementById("signupForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    let fullname =
    document.getElementById("fullName").value;

    let email =
    document.getElementById("email").value;

    let password =
    document.getElementById("password").value;

    let confirmPassword =
    document.getElementById("confirmPassword").value;

    if(password !== confirmPassword)
    {
        alert("Passwords do not match");
        return;
    }

    if(password.length < 6)
    {
        alert("Password must be at least 6 characters");
        return;
    }

    try {

        const response = await fetch(
            "http://localhost:8000/api/users/register",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    fullname,
                    email,
                    password
                })
            }
        );

        const data = await response.json();

        alert(data.message);

        window.location.href = "login.html";

    }
    catch(error)
    {
        console.log(error);
        alert("Registration Failed");
    }

});

</script>

</body>

</html>
