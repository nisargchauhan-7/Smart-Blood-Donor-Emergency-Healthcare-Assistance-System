<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-danger">

<div class="container">

<a class="navbar-brand" href="index.html">
SBDEHAS
</a>

<div>

<a href="dashboard.html" class="btn btn-light btn-sm me-2">
Dashboard
</a>

<button
class="btn btn-light btn-sm"
onclick="userLogout()">

Logout

</button>

</div>

</div>

</nav>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-body">

<h2 class="text-center text-danger mb-4">

My Profile

</h2>

<table class="table">

<tr>
<th>Full Name</th>
<td id="profileName"></td>
</tr>

<tr>
<th>Email</th>
<td id="profileEmail"></td>
</tr>

<tr>
<th>User ID</th>
<td id="profileId"></td>
</tr>

<tr>
    <td colspan="2" class="text-center">

        <button
        class="btn btn-danger"
        onclick="editProfile()">

            Edit Profile

        </button>

    </td>
</tr>

</table>

<hr>

<h4 class="text-danger mt-4">
Change Password
</h4>

<input
type="password"
id="oldPassword"
class="form-control mb-3"
placeholder="Current Password">

<input
type="password"
id="newPassword"
class="form-control mb-3"
placeholder="New Password">

<button
class="btn btn-danger"
onclick="changePassword()">

Change Password

</button>

<div id="editSection" style="display:none;">

    <div class="mt-4">

        <input
        type="text"
        id="editName"
        class="form-control mb-2"
        placeholder="Full Name">

        <input
        type="email"
        id="editEmail"
        class="form-control mb-2"
        placeholder="Email">

        <button
        class="btn btn-success"
        onclick="updateProfile()">

            Save Changes

        </button>

    </div>

</div>

</div>

</div>

</div>

</div>

</div>

<footer class="bg-dark text-white text-center py-4 mt-5">

<p class="mb-0">

© 2026 Smart Blood Donor & Emergency Healthcare Assistance System

</p>

</footer>

<script>

let currentUser =
JSON.parse(
localStorage.getItem("currentUser")
);

if(!currentUser)
{
    alert("Please Login First");

    window.location.href =
    "login.html";
}

document.getElementById("profileName")
.innerHTML =
currentUser.fullname;

document.getElementById("profileEmail")
.innerHTML =
currentUser.email;

document.getElementById("profileId")
.innerHTML =
currentUser.id;

function userLogout()
{
    localStorage.removeItem(
        "currentUser"
    );

    window.location.href =
    "index.html";
}

function editProfile()
{
    document
    .getElementById("editSection")
    .style.display = "block";

    document
    .getElementById("editName")
    .value = currentUser.fullname;

    document
    .getElementById("editEmail")
    .value = currentUser.email;
}

function updateProfile()
{
    fetch(
        `http://localhost:8000/api/users/update-profile/${currentUser.id}`,
        {
            method: "PUT",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({

                fullname:
                document.getElementById("editName").value,

                email:
                document.getElementById("editEmail").value

            })
        }
    )

    .then(res => res.json())

    .then(data => {

        currentUser.fullname =
        document.getElementById("editName").value;

        currentUser.email =
        document.getElementById("editEmail").value;

        localStorage.setItem(
            "currentUser",
            JSON.stringify(currentUser)
        );

        alert(data.message);

        location.reload();

    })

    .catch(err => {

        console.log(err);

        alert("Update Failed");

    });
}

function changePassword()
{
    let oldPassword =
    document.getElementById("oldPassword").value;

    let newPassword =
    document.getElementById("newPassword").value;

    fetch(
        `http://localhost:8000/api/users/change-password/${currentUser.id}`,
        {

            method: "PUT",

            headers: {
                "Content-Type":
                "application/json"
            },

            body: JSON.stringify({

                oldPassword,
                newPassword

            })

        }
    )

    .then(res => res.json())

    .then(data => {

        alert(data.message);

        document
        .getElementById("oldPassword")
        .value = "";

        document
        .getElementById("newPassword")
        .value = "";

    })

    .catch(err => {

        console.log(err);

        alert("Password Change Failed");

    });

}

</script>

</body>
</html>
