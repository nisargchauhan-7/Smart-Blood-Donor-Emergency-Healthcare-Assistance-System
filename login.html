<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SBDEHAS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">

        <div class="container">

            <a class="navbar-brand" href="index.html">
                SBDEHAS
            </a>

            <div>

                <a href="index.html" class="btn btn-light btn-sm me-2">
                    Home
                </a>

                <a href="signup.html" class="btn btn-light btn-sm">
                    Sign Up
                </a>

            </div>

        </div>

    </nav>

    <!-- Login Form -->

    <div class="container">

        <div class="row justify-content-center mt-5">

            <div class="col-md-5">

                <div class="card shadow">

                    <div class="card-body p-4">

                        <h2 class="text-center text-danger mb-4">
                            Login
                        </h2>

                        <form id="loginForm">

                            <div class="mb-3">

                                <label class="form-label">
                                    Email
                                </label>

                                <input
                                    type="email"
                                    id="email"
                                    class="form-control"
                                    placeholder="Enter Email">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Password
                                </label>

                                <input
                                    type="password"
                                    id="password"
                                    class="form-control"
                                    placeholder="Enter Password">

                            </div>

                            <button
                                type="submit"
                                class="btn btn-danger w-100">

                                Login

                            </button>

                            <hr>

                            <a  href="admin-login.html" class="btn btn-outline-danger w-100">Admin Login</a>

                            <div class="text-center mt-3">

                                <a href="signup.html">Don't have an account? Register</a>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Footer -->

    <footer class="bg-dark text-white text-center py-4 mt-5">

        <p class="mb-1">
            Smart Blood Donor & Emergency Healthcare Assistance System
        </p>

        <p class="small mb-0">
            Developed for GTU Societal Internship Project
        </p>

    </footer>

    <script>

document.getElementById("loginForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    let email =
    document.getElementById("email").value;

    let password =
    document.getElementById("password").value;

    try {

        const response = await fetch(
            "http://localhost:8000/api/users/login",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email,
                    password
                })
            }
        );

        const data = await response.json();

        if(response.ok)
        {
            localStorage.setItem(
                "currentUser",
                JSON.stringify(data.user)
            );

            alert("Login Successful");

            window.location.href =
            "dashboard.html";
        }
        else
        {
            alert(data.message);
        }

    }
    catch(error)
    {
        console.log(error);
        alert("Login Failed");
    }

});

</script>

</body>

</html>
